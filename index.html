<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Monitoring ESP32 + Alarm System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
    h2 { color: #00e5ff; text-transform: uppercase; }
    
    .controls, .interval-panel, .alarm-panel { 
      margin: 10px auto; padding: 15px; background: #1e1e1e; 
      display: inline-block; border-radius: 12px; border: 1px solid #333; 
    }
    
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
    .start { background-color: #00e676; color: black; }
    .stop { background-color: #ff5252; color: white; }
    .btn-sheet { background-color: #ffeb3b; color: black; }
    
    input { width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #00e5ff; background: #121212; color: white; text-align: center; }

    /* STYLE ALARM */
    .alarm-active { background-color: #ff5252 !important; animation: blink 0.5s infinite; color: white; padding: 10px; border-radius: 10px; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .row-alert { background-color: rgba(255, 82, 82, 0.3) !important; }

    .chart-container { background-color: #1e1e1e; border-radius: 10px; margin: 20px auto; padding: 15px; max-width: 95%; border: 1px solid #333; }
    table { margin: 20px auto; border-collapse: collapse; width: 95%; background-color: #1e1e1e; font-size: 14px; }
    th, td { padding: 12px; border: 1px solid #333; }
    th { background-color: #00bcd4; color: black; }
  </style>
</head>

<body>

<h2>🌙 Monitoring & Alarm Flow</h2>
<div id="alarm-status">Sistem Normal</div>

<div class="controls">
  <button class="start" onclick="setStatus('START')">🟢 START</button> 
  <button class="stop" onclick="setStatus('STOP')">🔴 STOP</button>
  <button class="btn-sheet" onclick="openSpreadsheet()">📊 DATA SPREADSHEET</button>
</div>

<div class="interval-panel">
  <label>⏱️ Update (dtk): </label>
  <input type="number" id="intervalInput" value="3" min="1">
  <button onclick="updateInterval()" style="background:#00bcd4; color:black; padding:5px 10px; border-radius:5px;">SET</button>
</div>

<div class="alarm-panel">
  <label>⚠️ Batas Flow Min: </label>
  <input type="number" id="flowMin" value="0.5" step="0.1">
  <label> Max: </label>
  <input type="number" id="flowMax" value="10.0" step="0.1">
</div>

<div class="chart-container">
  <h3>🚰 Grafik Flow Rate (L/min)</h3>
  <canvas id="chartFlow"></canvas>
</div>

<div class="chart-container">
  <h3>🌡️ Grafik Suhu & 💧 Humidity</h3>
  <canvas id="chartMain"></canvas>
</div>

<h3>📋 Log Data Terakhir</h3>
<table id="data-table">
  <thead>
    <tr><th>Waktu</th><th>LM35</th><th>DHT11</th><th>Hum</th><th>Flow</th></tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
const sheetURL = "https://opensheet.elk.sh/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/DATA";
const controlURL = "https://script.google.com/macros/s/AKfycbx-cziGXnj42WpcGbeZ4xOm3-StjmqZ-n_8pJy9binWBI0ezmUJgbqPCJS1ONNBNLYN/exec";
const spreadsheetURL = "https://docs.google.com/spreadsheets/d/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/edit";

let isSystemRunning = false; 
let dataTimer = null; 
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- INISIALISASI GRAFIK ---
const opt = { responsive: true, animation: false };
let chartFlow = new Chart(document.getElementById("chartFlow"), {
  type: 'line', data: { labels: [], datasets: [{ label: 'Flow', data: [], borderColor: '#ff5252' }] }, options: opt
});
let chartMain = new Chart(document.getElementById("chartMain"), {
  type: 'line', data: { labels: [], datasets: [
    { label: 'LM35', data: [], borderColor: '#ff9800' },
    { label: 'Humidity', data: [], borderColor: '#00e676' }
  ] }, options: opt
});

function openSpreadsheet() { window.open(spreadsheetURL, "_blank"); }

function setStatus(s) { fetch(controlURL + "?setStatus=" + s).then(() => location.reload()); }

function updateInterval() {
  const d = document.getElementById("intervalInput").value;
  clearInterval(dataTimer);
  dataTimer = setInterval(loadData, d * 1000);
  alert("Interval: " + d + " dtk");
}

// Fungsi Bunyi Alarm
function playAlarmSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = "sine";
  osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function loadData(){
  fetch(sheetURL).then(res => res.json()).then(data => {
    if (!data || data.length === 0) return;
    const tableBody = document.getElementById("table-body");
    tableBody.innerHTML = ""; 
    const last10 = data.slice(-10);
    
    let labels = [], flowArr = [], lm35Arr = [], humArr = [];
    const minF = parseFloat(document.getElementById("flowMin").value);
    const maxF = parseFloat(document.getElementById("flowMax").value);
    let isAlert = false;

    last10.forEach(row => {
      let keys = Object.keys(row);
      let f = parseFloat(row[keys[4]] || 0); // Kolom 5 Sapu Jagat
      let t1 = parseFloat(row[keys[1]] || 0);
      let h = parseFloat(row[keys[3]] || 0);
      let w = row[keys[0]];

      // CEK ALARM (Data Terbaru)
      if (f < minF || f > maxF) { isAlert = true; }

      let tr = tableBody.insertRow(0);
      if (f < minF || f > maxF) tr.className = "row-alert";
      tr.innerHTML = `<td>${w}</td><td>${t1}</td><td>${row[keys[2]]}</td><td>${h}</td><td>${f}</td>`;

      labels.push(w); flowArr.push(f); lm35Arr.push(t1); humArr.push(h);
    });

    // Update Status UI
    const statusBox = document.getElementById("alarm-status");
    if (isAlert) {
      statusBox.innerText = "⚠️ BAHAYA: FLOW DILUAR BATAS!";
      statusBox.className = "alarm-active";
      playAlarmSound();
    } else {
      statusBox.innerText = "Sistem Normal";
      statusBox.className = "";
    }

    chartFlow.data.labels = labels; chartFlow.data.datasets[0].data = flowArr; chartFlow.update();
    chartMain.data.labels = labels; chartMain.data.datasets[0].data = lm35Arr; chartMain.data.datasets[1].data = humArr; chartMain.update();
  });
}

// Start
fetch(controlURL).then(res => res.text()).then(d => {
  isSystemRunning = (d.trim() === "START");
  if(isSystemRunning) dataTimer = setInterval(loadData, 3000);
});
</script>
</body>
</html>
