<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard ESP32 - Auto Reset Alarm</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
    h2 { color: #00e5ff; text-transform: uppercase; letter-spacing: 1px; }
    
    .controls, .interval-panel, .alarm-panel { 
      margin: 10px auto; padding: 15px; background: #1e1e1e; 
      display: inline-block; border-radius: 12px; border: 1px solid #333; 
    }
    
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .start { background-color: #00e676; color: black; }
    .stop { background-color: #ff5252; color: white; }
    .btn-sheet { background-color: #ffeb3b; color: black; }
    
    input { width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #00e5ff; background: #121212; color: white; text-align: center; font-size: 16px; }

    /* STYLE ALARM AUTO-RESET */
    #status-container { margin: 20px 0; min-height: 80px; }
    .alarm-active { background-color: #ff5252 !important; animation: blink 0.6s infinite; color: white; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 20px; border: 2px solid white; }
    .status-normal { background-color: #1e1e1e; color: #00e676; padding: 15px; border-radius: 10px; font-weight: bold; border: 1px solid #333; }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    .row-alert { background-color: rgba(255, 82, 82, 0.4) !important; color: #ffcdd2; }

    .chart-container { background-color: #1e1e1e; border-radius: 10px; margin: 20px auto; padding: 15px; max-width: 95%; border: 1px solid #333; }
    table { margin: 20px auto; border-collapse: collapse; width: 95%; background-color: #1e1e1e; font-size: 14px; }
    th, td { padding: 12px; border: 1px solid #333; }
    th { background-color: #00bcd4; color: black; }
    tr:nth-child(even) { background-color: #252525; }
  </style>
</head>

<body>

<h2>🌙 Monitoring System ESP32</h2>

<div id="status-container">
  <div id="alarm-banner" class="status-normal">Menghubungkan ke Sensor...</div>
  <p id="status-text" style="margin-top:10px;">Status ESP32: Menunggu...</p>
</div>

<div class="controls">
  <button class="start" onclick="setStatus('START')">🟢 START</button> 
  <button class="stop" onclick="setStatus('STOP')">🔴 STOP</button>
  <button class="btn-sheet" onclick="openSpreadsheet()">📊 BUKA SPREADSHEET</button>
</div>

<div class="interval-panel">
  <label>⏱️ Update (Dtk): </label>
  <input type="number" id="intervalInput" value="3" min="1">
  <button onclick="updateInterval()" style="background:#00bcd4; padding:8px; border-radius:5px;">SET</button>
</div>

<div class="alarm-panel">
  <label>⚠️ Batas Flow Min: </label>
  <input type="number" id="flowMin" value="0.5" step="0.1">
  <label> | Max: </label>
  <input type="number" id="flowMax" value="10.0" step="0.1">
</div>

<div class="chart-container">
  <h3>🚰 Grafik Flow Rate (L/min)</h3>
  <canvas id="chartFlow"></canvas>
</div>

<div class="chart-container">
  <h3>🌡️ Grafik Sensor Suhu & Hum</h3>
  <canvas id="chartSensors"></canvas>
</div>

<h3>📋 Tabel Log Data</h3>
<table id="data-table">
  <thead>
    <tr>
      <th>Waktu</th>
      <th>LM35 (°C)</th>
      <th>DHT11 (°C)</th>
      <th>Humidity (%)</th>
      <th>Flow (L/m)</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
const sheetURL = "https://opensheet.elk.sh/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/DATA";
const controlURL = "https://script.google.com/macros/s/AKfycbx-cziGXnj42WpcGbeZ4xOm3-StjmqZ-n_8pJy9binWBI0ezmUJgbqPCJS1ONNBNLYN/exec";
const spreadsheetURL = "https://docs.google.com/spreadsheets/d/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/edit";

let isSystemRunning = false; 
let dataTimer = null; 
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- GRAFIK ---
const chartOptions = { responsive: true, animation: false, scales: { y: { beginAtZero: true } } };
let chartFlow = new Chart(document.getElementById("chartFlow"), {
  type: 'line', data: { labels: [], datasets: [{ label: 'Flow Rate', data: [], borderColor: '#ff5252', tension: 0.1 }] }, options: chartOptions 
});
let chartSensors = new Chart(document.getElementById("chartSensors"), {
  type: 'line', data: { labels: [], datasets: [
    { label: 'LM35', data: [], borderColor: '#ff9800' },
    { label: 'DHT11', data: [], borderColor: '#00e5ff' },
    { label: 'Hum', data: [], borderColor: '#00e676' }
  ]}, options: chartOptions 
});

// --- FUNGSI ---
function openSpreadsheet() { window.open(spreadsheetURL, "_blank"); }

function setStatus(state) {
  fetch(controlURL + "?setStatus=" + state).then(() => {
    alert("Sistem diatur ke: " + state);
    location.reload(); 
  });
}

function getStatus() {
  fetch(controlURL).then(res => res.text()).then(data => {
    const statusClean = data.trim();
    const statusText = document.getElementById("status-text");
    statusText.innerText = "Status ESP32: " + statusClean;
    isSystemRunning = (statusClean === "START");
    statusText.style.color = isSystemRunning ? "#00e676" : "#ff5252";
  });
}

function updateInterval() {
  const detik = document.getElementById("intervalInput").value;
  clearInterval(dataTimer);
  dataTimer = setInterval(loadData, detik * 1000);
  alert("Interval diperbarui!");
}

function playAlarmSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = "square";
  osc.frequency.setValueAtTime(660, audioCtx.currentTime); 
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// --- CORE LOAD DATA ---
function loadData(){
  if (!isSystemRunning) return; 

  fetch(sheetURL).then(res => res.json()).then(data => {
    if (!data || data.length === 0) return;

    const tableBody = document.getElementById("table-body");
    const alarmBanner = document.getElementById("alarm-banner");
    tableBody.innerHTML = ""; 
    
    let labels = [], flowArr = [], lm35Arr = [], dhtArr = [], humArr = [];
    const last10 = data.slice(-10);
    
    // Ambil input batas alarm
    const minF = parseFloat(document.getElementById("flowMin").value);
    const maxF = parseFloat(document.getElementById("flowMax").value);
    
    // Logika Alarm: Hanya cek data PALING BARU (data terakhir dalam array)
    let latestData = last10[last10.length - 1];
    let latestKeys = Object.keys(latestData);
    let latestFlow = parseFloat(latestData[latestKeys[4]] || 0);

    // RESET ATAU AKTIFKAN ALARM
    if (latestFlow < minF || latestFlow > maxF) {
      alarmBanner.innerText = "⚠️ BAHAYA: FLOW TIDAK NORMAL (" + latestFlow.toFixed(2) + ")";
      alarmBanner.className = "alarm-active";
      playAlarmSound();
    } else {
      alarmBanner.innerText = "✅ SISTEM NORMAL (Flow: " + latestFlow.toFixed(2) + ")";
      alarmBanner.className = "status-normal";
    }

    last10.forEach(row => {
      let keys = Object.keys(row); 
      let waktuVal = row[keys[0]] || "-";
      let lm35Val  = parseFloat(row[keys[1]] || 0);
      let dhtVal   = parseFloat(row[keys[2]] || 0);
      let humVal   = parseFloat(row[keys[3]] || 0);
      let flowVal  = parseFloat(row[keys[4]] || 0);

      let tr = tableBody.insertRow(0);
      if (flowVal < minF || flowVal > maxF) tr.className = "row-alert";
      tr.innerHTML = `<td>${waktuVal}</td><td>${lm35Val}</td><td>${dhtVal}</td><td>${humVal}</td><td>${flowVal}</td>`;

      labels.push(waktuVal);
      flowArr.push(flowVal); lm35Arr.push(lm35Val); dhtArr.push(dhtVal); humArr.push(humVal);
    });

    chartFlow.data.labels = labels; chartFlow.data.datasets[0].data = flowArr; chartFlow.update();
    chartSensors.data.labels = labels;
    chartSensors.data.datasets[0].data = lm35Arr;
    chartSensors.data.datasets[1].data = dhtArr;
    chartSensors.data.datasets[2].data = humArr;
    chartSensors.update();
  });
}

getStatus();
setInterval(getStatus, 5000); 
dataTimer = setInterval(loadData, 3000);
document.body.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); });
</script>
</body>
</html>
