<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Monitoring ESP32 - Final</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
    h2 { color: #00e5ff; text-transform: uppercase; }
    
    /* Navigasi & Tombol */
    .controls { margin: 20px 0; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    
    .start { background-color: #00e676; color: black; }
    .stop { background-color: #ff5252; color: white; }
    .btn-sheet { background-color: #ffeb3b; color: black; }
    
    /* Panel Interval */
    .interval-panel { 
      margin: 20px auto; padding: 15px; background: #1e1e1e; 
      display: inline-block; border-radius: 12px; border: 1px solid #333; 
    }
    #intervalInput { 
      width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #00e5ff; 
      background: #121212; color: white; text-align: center; font-size: 16px;
    }
    .btn-set { background-color: #00bcd4; color: black; padding: 8px 15px; }

    /* Grafik & Tabel */
    .chart-container { background-color: #1e1e1e; border-radius: 10px; margin: 20px auto; padding: 15px; max-width: 95%; border: 1px solid #333; }
    table { margin: 20px auto; border-collapse: collapse; width: 95%; background-color: #1e1e1e; font-size: 14px; }
    th, td { padding: 12px; border: 1px solid #333; }
    th { background-color: #00bcd4; color: black; }
    tr:nth-child(even) { background-color: #252525; }
    
    #status { font-size: 18px; margin: 15px; font-weight: bold; }
  </style>
</head>

<body>

<h2>🌙 Sistem Monitoring Real-Time</h2>
<p id="status">Menghubungkan ke Server...</p>

<div class="controls">
  <button class="start" onclick="setStatus('START')">🟢 START</button> 
  <button class="stop" onclick="setStatus('STOP')">🔴 STOP</button>
  <button class="btn-sheet" onclick="openSpreadsheet()">📊 BUKA SPREADSHEET</button>
</div>

<div class="interval-panel">
  <label for="intervalInput">⏱️ Refresh Setiap (Detik): </label>
  <input type="number" id="intervalInput" value="3" min="1">
  <button class="btn-set" onclick="updateInterval()">SET & REFRESH</button>
</div>

<div class="chart-container">
  <h3>🌡️ Grafik Suhu (LM35 vs DHT11)</h3>
  <canvas id="chartTemp"></canvas>
</div>

<div class="chart-container">
  <h3>💧 Grafik Kelembapan (%)</h3>
  <canvas id="chartHum"></canvas>
</div>

<div class="chart-container">
  <h3>🚰 Grafik Flow Sensor (L/min)</h3>
  <canvas id="chartFlow"></canvas>
</div>

<h3>📋 Tabel Log Data</h3>
<table id="data-table">
  <thead>
    <tr>
      <th>Waktu</th>
      <th>LM35 (°C)</th>
      <th>DHT11 (°C)</th>
      <th>Humidity (%)</th>
      <th>Flow (L/m)</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
// ===== 1. CONFIG URL =====
const sheetURL = "https://opensheet.elk.sh/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/DATA";
const controlURL = "https://script.google.com/macros/s/AKfycbx-cziGXnj42WpcGbeZ4xOm3-StjmqZ-n_8pJy9binWBI0ezmUJgbqPCJS1ONNBNLYN/exec";
const spreadsheetURL = "https://docs.google.com/spreadsheets/d/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/edit";

let isSystemRunning = false; 
let dataTimer = null; 

// ===== 2. INISIALISASI GRAFIK (TANPA ANIMASI AGAR RESPONSIF) =====
const chartOptions = { 
  responsive: true, 
  animation: false, // Penting agar data langsung berubah sesuai detik interval
  scales: { y: { beginAtZero: true }, x: { ticks: { color: '#888' } } } 
};

function createChart(id, datasets) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels: [], datasets: datasets },
    options: chartOptions
  });
}

let chartTemp = createChart("chartTemp", [
  { label: 'LM35', data: [], borderColor: '#ff9800', tension: 0.1 },
  { label: 'DHT11', data: [], borderColor: '#00e5ff', tension: 0.1 }
]);

let chartHum = createChart("chartHum", [
  { label: 'Humidity', data: [], borderColor: '#00e676', tension: 0.1 }
]);

let chartFlow = createChart("chartFlow", [
  { label: 'Flow Rate', data: [], borderColor: '#ff5252', tension: 0.1 }
]);

// ===== 3. LOGIKA KONTROL =====

function openSpreadsheet() {
  window.open(spreadsheetURL, "_blank");
}

function setStatus(state) {
  fetch(controlURL + "?setStatus=" + state)
    .then(() => {
      getStatus(); 
      if(state === 'START') loadData(); 
    });
}

function getStatus() {
  fetch(controlURL)
    .then(res => res.text())
    .then(data => {
      const statusClean = data.trim();
      const statusEl = document.getElementById("status");
      statusEl.innerText = "Sistem: " + statusClean;
      
      if (statusClean === "START") {
        isSystemRunning = true;
        statusEl.style.color = "#00e676";
      } else {
        isSystemRunning = false;
        statusEl.style.color = "#ff5252";
      }
    });
}

// PERBAIKAN INTERVAL: Menghapus timer lama sebelum membuat yang baru
function updateInterval() {
  const detik = document.getElementById("intervalInput").value;
  if (detik < 1) { alert("Minimal 1 detik!"); return; }

  const ms = detik * 1000;
  if (dataTimer) clearInterval(dataTimer);
  
  loadData(); // Langsung refresh data saat diklik
  dataTimer = setInterval(loadData, ms);
  
  alert("Refresh rate diatur ke " + detik + " detik");
}

// ===== 4. LOAD DATA (PERBAIKAN PEMBACAAN FLOW) =====
function loadData(){
  if (!isSystemRunning) return; 

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {
      if (!data || data.length === 0) return;

      const tableBody = document.getElementById("table-body");
      tableBody.innerHTML = ""; 

      let labels = [], lm35D = [], dhtD = [], humD = [], flowD = [];
      const lastData = data.slice(-10);

      lastData.forEach(row => {
        // Ambil data dengan toleransi perbedaan nama kolom (Huruf Besar/Kecil/Spasi)
        let lm35 = parseFloat(row.LM35 || row.lm35 || 0);
        let dht  = parseFloat(row.DHT11 || row.dht11 || 0);
        let hum  = parseFloat(row.Humidity || row.humidity || 0);
        
        // PERBAIKAN FLOW: Mencari di berbagai kemungkinan nama kolom
        let flow = parseFloat(row.Flow || row.flow || row["Flow Rate"] || row["flow_rate"] || 0);

        // Isi Tabel
        let tr = tableBody.insertRow(0);
        tr.insertCell(0).innerText = row.Waktu || "-";
        tr.insertCell(1).innerText = lm35.toFixed(1);
        tr.insertCell(2).innerText = dht.toFixed(1);
        tr.insertCell(3).innerText = hum.toFixed(1);
        tr.insertCell(4).innerText = flow.toFixed(2);

        // Isi Array Grafik
        labels.push(row.Waktu || "");
        lm35D.push(lm35);
        dhtD.push(dht);
        humD.push(hum);
        flowD.push(flow);
      });

      // Update semua grafik
      chartTemp.data.labels = labels;
      chartTemp.data.datasets[0].data = lm35D;
      chartTemp.data.datasets[1].data = dhtD;
      chartTemp.update();

      chartHum.data.labels = labels;
      chartHum.data.datasets[0].data = humD;
      chartHum.update();

      chartFlow.data.labels = labels;
      chartFlow.data.datasets[0].data = flowD;
      chartFlow.update();
    })
    .catch(err => console.error("Gagal mengambil data Spreadsheet"));
}

// ===== 5. RUN SYSTEM =====
getStatus(); 
setInterval(getStatus, 2000); // Sinkronisasi tombol Start/Stop
dataTimer = setInterval(loadData, 3000); // Default jalankan per 3 detik

</script>
</body>
</html>
