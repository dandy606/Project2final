<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Final Dashboard Monitoring ESP32</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* STYLE DASHBOARD */
    body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
    h2 { color: #00e5ff; text-transform: uppercase; letter-spacing: 1px; }
    
    /* TOMBOL & KONTROL */
    .controls { margin: 20px 0; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    
    .start { background-color: #00e676; color: black; }
    .stop { background-color: #ff5252; color: white; }
    .btn-sheet { background-color: #ffeb3b; color: black; }
    
    /* PANEL INTERVAL */
    .interval-panel { 
      margin: 20px auto; padding: 15px; background: #1e1e1e; 
      display: inline-block; border-radius: 12px; border: 1px solid #333; 
    }
    #intervalInput { 
      width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #00e5ff; 
      background: #121212; color: white; text-align: center; font-size: 16px;
    }
    .btn-set { background-color: #00bcd4; color: black; padding: 8px 15px; }

    /* GRAFIK & TABEL */
    .chart-container { background-color: #1e1e1e; border-radius: 10px; margin: 20px auto; padding: 15px; max-width: 95%; border: 1px solid #333; }
    table { margin: 20px auto; border-collapse: collapse; width: 95%; background-color: #1e1e1e; font-size: 14px; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; border: 1px solid #333; }
    th { background-color: #00bcd4; color: black; }
    tr:nth-child(even) { background-color: #252525; }
    
    #status { font-size: 18px; margin: 15px; font-weight: bold; }
  </style>
</head>

<body>

<h2>🌙 Monitoring System ESP32</h2>
<p id="status">Inisialisasi...</p>

<div class="controls">
  <button class="start" onclick="setStatus('START')">🟢 START</button> 
  <button class="stop" onclick="setStatus('STOP')">🔴 STOP</button>
  <button class="btn-sheet" onclick="openSpreadsheet()">📊 DATA SPREADSHEET</button>
</div>

<div class="interval-panel">
  <label for="intervalInput">⏱️ Update Data (Detik): </label>
  <input type="number" id="intervalInput" value="3" min="1">
  <button class="btn-set" onclick="updateInterval()">SET & REFRESH</button>
</div>

<div class="chart-container">
  <h3>🌡️ Grafik Suhu (LM35 vs DHT11)</h3>
  <canvas id="chartTemp"></canvas>
</div>

<div class="chart-container">
  <h3>💧 Grafik Kelembapan (%)</h3>
  <canvas id="chartHum"></canvas>
</div>

<div class="chart-container">
  <h3>🚰 Grafik Flow Rate (L/min)</h3>
  <canvas id="chartFlow"></canvas>
</div>

<h3>📋 Log Data Terakhir</h3>
<table id="data-table">
  <thead>
    <tr>
      <th>Waktu</th>
      <th>LM35 (°C)</th>
      <th>DHT11 (°C)</th>
      <th>Humidity (%)</th>
      <th>Flow (L/m)</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
// ===== 1. KONFIGURASI =====
const sheetURL = "https://opensheet.elk.sh/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/DATA";
const controlURL = "https://script.google.com/macros/s/AKfycbx-cziGXnj42WpcGbeZ4xOm3-StjmqZ-n_8pJy9binWBI0ezmUJgbqPCJS1ONNBNLYN/exec";
const spreadsheetURL = "https://docs.google.com/spreadsheets/d/1FPYOkyNUxfQHIs9WuXchkAKFpV8WczjSBQfyN1OB2YE/edit";

let isSystemRunning = false; 
let dataTimer = null; 

// ===== 2. INISIALISASI GRAFIK (NO ANIMATION FOR SPEED) =====
const chartOptions = { 
  responsive: true, 
  animation: false, 
  scales: { y: { beginAtZero: true } } 
};

function initChart(id, label1, color1, label2 = null, color2 = null) {
  let datasets = [{ label: label1, data: [], borderColor: color1, tension: 0.1 }];
  if (label2) datasets.push({ label: label2, data: [], borderColor: color2, tension: 0.1 });
  return new Chart(document.getElementById(id), { type: 'line', data: { labels: [], datasets: datasets }, options: chartOptions });
}

let chartTemp = initChart("chartTemp", "LM35", "#ff9800", "DHT11", "#00e5ff");
let chartHum  = initChart("chartHum", "Humidity", "#00e676");
let chartFlow = initChart("chartFlow", "Flow Rate", "#ff5252");

// ===== 3. FUNGSI SAKTI AUTO-DETECT DATA =====
// Fungsi ini akan mencari nama kolom secara cerdas agar tidak terbaca 0
function getValue(row, keyNames) {
  for (let key in row) {
    if (keyNames.some(name => key.toLowerCase().trim() === name.toLowerCase())) {
      return parseFloat(row[key] || 0);
    }
  }
  return 0;
}

// ===== 4. LOGIKA SISTEM =====
function openSpreadsheet() { window.open(spreadsheetURL, "_blank"); }

function setStatus(state) {
  fetch(controlURL + "?setStatus=" + state).then(() => { getStatus(); if(state === 'START') loadData(); });
}

function getStatus() {
  fetch(controlURL).then(res => res.text()).then(data => {
    const statusClean = data.trim();
    const statusEl = document.getElementById("status");
    statusEl.innerText = "Status Sistem: " + statusClean;
    isSystemRunning = (statusClean === "START");
    statusEl.style.color = isSystemRunning ? "#00e676" : "#ff5252";
  });
}

function updateInterval() {
  const detik = document.getElementById("intervalInput").value;
  if (detik < 1) return;
  
  if (dataTimer) clearInterval(dataTimer);
  loadData(); // Refresh instan
  dataTimer = setInterval(loadData, detik * 1000);
  alert("Refresh Rate: " + detik + " detik");
}

// ===== 5. MENGAMBIL DATA =====
function loadData(){
  if (!isSystemRunning) return; 

  fetch(sheetURL)
    .then(res => res.json())
    .then(data => {
      if (!data || data.length === 0) return;

      const tableBody = document.getElementById("table-body");
      tableBody.innerHTML = ""; 

      let labels = [], lm35Arr = [], dhtArr = [], humArr = [], flowArr = [];
      const last10 = data.slice(-10);

      last10.forEach(row => {
        // Ambil data (Toleransi nama kolom besar/kecil/spasi)
        let lm35Val = getValue(row, ["lm35"]);
        let dhtVal  = getValue(row, ["dht11", "dht"]);
        let humVal  = getValue(row, ["humidity", "hum"]);
        let flowVal = getValue(row, ["flow", "flow rate", "flow_rate"]);

        // Update Tabel
        let tr = tableBody.insertRow(0);
        tr.insertCell(0).innerText = row.Waktu || row.waktu || "-";
        tr.insertCell(1).innerText = lm35Val.toFixed(1);
        tr.insertCell(2).innerText = dhtVal.toFixed(1);
        tr.insertCell(3).innerText = humVal.toFixed(1);
        tr.insertCell(4).innerText = flowVal.toFixed(2);

        // Update Array Chart
        labels.push(row.Waktu || row.waktu || "");
        lm35Arr.push(lm35Val); dhtArr.push(dhtVal); humArr.push(humVal); flowArr.push(flowVal);
      });

      // Render ke Chart
      chartTemp.data.labels = labels;
      chartTemp.data.datasets[0].data = lm35Arr;
      chartTemp.data.datasets[1].data = dhtArr;
      chartTemp.update();

      chartHum.data.labels = labels;
      chartHum.data.datasets[0].data = humArr;
      chartHum.update();

      chartFlow.data.labels = labels;
      chartFlow.data.datasets[0].data = flowArr;
      chartFlow.update();
    })
    .catch(e => console.log("Gagal memuat data JSON"));
}

// RUN PERTAMA KALI
getStatus();
setInterval(getStatus, 2500); 
dataTimer = setInterval(loadData, 3000); // Default 3 detik
</script>

</body>
</html>
